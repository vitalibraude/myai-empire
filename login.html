<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>כניסה פנימית — myAI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:380px;padding:32px;background:linear-gradient(135deg,#111 0%,#1a1a2e 100%);border-radius:16px;box-shadow:0 8px 32px rgba(0,212,255,0.15)}
.login-box h1{text-align:center;font-size:1.6rem;margin-bottom:8px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{text-align:center;color:#888;font-size:0.85rem;margin-bottom:24px}
label{display:block;margin-bottom:4px;font-size:0.9rem;color:#ccc}
input{width:100%;padding:12px;margin-bottom:16px;border-radius:8px;border:1px solid #333;background:#0a0a0a;color:#fff;font-size:1rem;direction:rtl}
input:focus{outline:none;border-color:#00d4ff;box-shadow:0 0 8px rgba(0,212,255,0.3)}
button{width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;font-size:1.05rem;font-weight:600;cursor:pointer;transition:transform 0.2s}
button:hover{transform:scale(1.02)}
.error{display:none;text-align:center;color:#ff6b6b;margin-top:12px;font-size:0.9rem}
.logo{text-align:center;margin-bottom:16px;font-size:2rem}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🔒</div>
  <h1>כניסה פנימית</h1>
  <p>גישה מוגבלת לצוות בלבד</p>
  <form id="loginForm" autocomplete="off">
    <label for="user">שם משתמש</label>
    <input id="user" type="text" placeholder="הכנס שם משתמש" required autofocus>
    <label for="pass">סיסמה</label>
    <input id="pass" type="password" placeholder="הכנס סיסמה" required>
    <button type="submit">התחבר</button>
  </form>
  <div class="error" id="err">שם משתמש או סיסמה שגויים</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  var u=document.getElementById('user').value.trim();
  var p=document.getElementById('pass').value;
  if(u==='\u05D5\u05D9\u05D8\u05DC\u05D9' && p==='1234'){
    sessionStorage.setItem('aoeua_auth','1');
    window.location.href='private.html';
  } else {
    document.getElementById('err').style.display='block';
    setTimeout(function(){document.getElementById('err').style.display='none';},3000);
  }
});
</script>
</body>
</html>
